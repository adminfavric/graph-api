# /etc/nginx/sites-available/graph-api.favric.cl
#
# Reverse proxy TLS para el backend FastAPI de TabletRoom.
# El contenedor escucha solo en 127.0.0.1:8000 (ver docker-compose.yml);
# Nginx es el único expuesto a Internet y termina el TLS.

# --- HTTP: redirige todo a HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name graph-api.favric.cl;

    # Necesario para que certbot pueda emitir/renovar el certificado.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: proxy a FastAPI ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name graph-api.favric.cl;

    # Estas dos líneas las rellena certbot automáticamente al emitir el cert.
    ssl_certificate     /etc/letsencrypt/live/graph-api.favric.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/graph-api.favric.cl/privkey.pem;

    # Endurecimiento básico de TLS.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # La agenda es liviana; un timeout corto evita conexiones colgadas.
    proxy_connect_timeout 15s;
    proxy_read_timeout    20s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
