services:
  agenda-api:
    build: .
    image: tabletroom-agenda:latest
    container_name: tabletroom-agenda
    restart: unless-stopped
    env_file:
      - .env
    # Logs persistentes en el host (./logs). Rotan a diario y se conservan
    # LOG_RETENTION_DAYS (3 por defecto); los más viejos se borran solos.
    volumes:
      - ./logs:/app/logs
    # Solo escucha en localhost del VPS; Nginx hace de reverse proxy con TLS.
    # Puerto host 8011 (el 8000 ya lo usa ms-catalogue-web-1 en este VPS).
    # Interno sigue siendo 8000 (uvicorn). Si cambias el host port, actualiza
    # también deploy/nginx-graph-api.favric.cl.conf (proxy_pass).
    ports:
      - "127.0.0.1:8011:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
